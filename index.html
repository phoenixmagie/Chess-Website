<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Schach - Adaptive KI</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #121212; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #fff;
        }
        #ui {
            position: absolute; 
            top: 20px; 
            left: 20px; 
            background: rgba(30, 30, 30, 0.85); 
            padding: 20px; 
            border-radius: 10px; 
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        h1 { margin: 0 0 10px 0; font-size: 1.5rem; color: #4CAF50; }
        p { margin: 5px 0; font-size: 1rem; }
        #status-msg { font-weight: bold; color: #FFC107; }
        #canvas-container { width: 100vw; height: 100vh; }
        .loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 2rem; pointer-events: none; transition: opacity 0.5s;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body>

    <div id="ui">
        <h1>3D Schach vs. KI</h1>
        <p>Status: <span id="status-msg">Dein Zug (Weiß)</span></p>
        <p>Aktuelle KI-Suchtiefe: <span id="ki-depth">-</span></p>
        <p style="font-size: 0.8rem; margin-top: 15px; color: #aaa;">
            Bedienung: Linksklick zum Auswählen/Ziehen.<br>
            Kamera: Ziehen (Drehen), Scrollen (Zoom).
        </p>
    </div>
    
    <div id="loading" class="loading">Spielfeld wird aufgebaut...</div>
    <div id="canvas-container"></div>

    <script>
        // --- 1. GRUNDLEGENDE SETUP & VARIABLEN ---
        const game = new Chess();
        const container = document.getElementById('canvas-container');
        const statusEl = document.getElementById('status-msg');
        const depthEl = document.getElementById('ki-depth');
        const loadingEl = document.getElementById('loading');

        let scene, camera, renderer, controls;
        let boardGroup = new THREE.Group();
        let piecesGroup = new THREE.Group();
        let squares = {}; // Speichert die 3D-Kacheln für Raycasting
        let pieceMeshes = {}; // Speichert die 3D-Figuren

        const TILE_SIZE = 2;
        let selectedSquare = null;
        let validMoves = [];

        // Farben
        const COLOR_WHITE = 0xdddddd;
        const COLOR_BLACK = 0x222222;
        const BOARD_LIGHT = 0xf0d9b5;
        const BOARD_DARK = 0xb58863;
        const HIGHLIGHT_COLOR = 0x7b61ff;

        // --- 2. THREE.JS INITIALISIERUNG ---
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x121212);
            scene.fog = new THREE.Fog(0x121212, 20, 60);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enablePan = false;
            controls.maxPolarAngle = Math.PI / 2 - 0.1; // Nicht unter das Brett schauen
            controls.minDistance = 10;
            controls.maxDistance = 40;

            // Beleuchtung
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            scene.add(boardGroup);
            scene.add(piecesGroup);

            createBoard();
            updateBoard3D(); // Setzt Figuren anhand von chess.js

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('pointerdown', onPointerDown);

            loadingEl.style.opacity = 0;
            animate();
        }

        // --- 3. SPIELBRETT & FIGUREN GENERIEREN ---
        function createBoard() {
            const files = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];
            for (let rank = 0; rank < 8; rank++) {
                for (let file = 0; file < 8; file++) {
                    const isLight = (rank + file) % 2 !== 0;
                    const color = isLight ? BOARD_LIGHT : BOARD_DARK;
                    
                    const geo = new THREE.BoxGeometry(TILE_SIZE, 0.5, TILE_SIZE);
                    const mat = new THREE.MeshStandardMaterial({ color: color });
                    const square = new THREE.Mesh(geo, mat);
                    
                    // Berechne Position (Zentrum ist 0,0)
                    const x = (file - 3.5) * TILE_SIZE;
                    const z = (3.5 - rank) * TILE_SIZE; 
                    
                    square.position.set(x, -0.25, z);
                    square.receiveShadow = true;
                    
                    const squareName = files[file] + (rank + 1);
                    square.userData = { name: squareName, originalColor: color };
                    
                    boardGroup.add(square);
                    squares[squareName] = square;
                }
            }
        }

        // Prozedurale Figurenerstellung (Damit wir keine externen Modelle laden müssen)
        function createPieceMesh(type, colorCode) {
            const material = new THREE.MeshStandardMaterial({ 
                color: colorCode, 
                roughness: 0.3, 
                metalness: 0.1 
            });
            const group = new THREE.Group();
            
            // Basis für alle Figuren
            const baseGeo = new THREE.CylinderGeometry(0.7, 0.9, 0.4, 32);
            const base = new THREE.Mesh(baseGeo, material);
            base.position.y = 0.2;
            base.castShadow = true;
            group.add(base);

            let body;
            switch(type) {
                case 'p': // Bauer
                    body = new THREE.Mesh(new THREE.SphereGeometry(0.6, 32, 32), material);
                    body.position.y = 1.0;
                    break;
                case 'r': // Turm
                    body = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.7, 1.5, 32), material);
                    body.position.y = 1.15;
                    break;
                case 'n': // Springer
                    body = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.5, 1.2), material);
                    body.position.set(0, 1.15, 0.2);
                    body.rotation.x = -0.2;
                    break;
                case 'b': // Läufer
                    body = new THREE.Mesh(new THREE.ConeGeometry(0.6, 1.8, 32), material);
                    body.position.y = 1.3;
                    break;
                case 'q': // Dame
                    body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 2.0, 32), material);
                    const crown = new THREE.Mesh(new THREE.TorusGeometry(0.6, 0.15, 16, 32), material);
                    crown.position.y = 2.0;
                    crown.rotation.x = Math.PI / 2;
                    body.add(crown);
                    body.position.y = 1.4;
                    break;
                case 'k': // König
                    body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.8, 2.2, 32), material);
                    const crossV = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), material);
                    const crossH = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, 0.2), material);
                    crossV.position.y = 2.5;
                    crossH.position.y = 2.5;
                    body.add(crossV);
                    body.add(crossH);
                    body.position.y = 1.5;
                    break;
            }
            body.castShadow = true;
            group.add(body);
            return group;
        }

        // Synchronisiert die Three.js 3D-Welt mit dem internen chess.js Board
        function updateBoard3D() {
            // Alte Figuren löschen
            while(piecesGroup.children.length > 0){ 
                piecesGroup.remove(piecesGroup.children[0]); 
            }
            pieceMeshes = {};

            const board = game.board();
            const files = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];

            for (let r = 0; r < 8; r++) {
                for (let f = 0; f < 8; f++) {
                    const piece = board[r][f];
                    if (piece) {
                        const sqName = files[f] + (8 - r);
                        const isWhite = piece.color === 'w';
                        const colorCode = isWhite ? COLOR_WHITE : COLOR_BLACK;
                        
                        const mesh = createPieceMesh(piece.type, colorCode);
                        
                        // Setze Rotation für schwarze Figuren (damit Springer richtig schauen)
                        if(!isWhite) mesh.rotation.y = Math.PI;

                        const squareMesh = squares[sqName];
                        mesh.position.set(squareMesh.position.x, 0, squareMesh.position.z);
                        
                        piecesGroup.add(mesh);
                        pieceMeshes[sqName] = mesh;
                    }
                }
            }
        }

        // --- 4. INTERAKTION (Raycasting) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function onPointerDown(event) {
            // Nur wenn der Spieler (Weiß) dran ist
            if (game.turn() === 'b' || game.game_over()) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            
            // Klick auf Brett prüfen
            const intersects = raycaster.intersectObjects(boardGroup.children);
            
            if (intersects.length > 0) {
                const clickedSquare = intersects[0].object.userData.name;
                handleSquareClick(clickedSquare);
            }
        }

        function handleSquareClick(sqName) {
            // 1. Klick: Figur auswählen
            if (!selectedSquare) {
                const piece = game.get(sqName);
                if (piece && piece.color === 'w') {
                    selectedSquare = sqName;
                    highlightSquare(sqName);
                    // Mögliche Züge holen
                    validMoves = game.moves({ square: sqName, verbose: true });
                    validMoves.forEach(m => highlightSquare(m.to, true));
                }
            } 
            // 2. Klick: Zug ausführen oder andere Figur wählen
            else {
                const move = validMoves.find(m => m.to === sqName);
                
                if (move) {
                    // Falls Bauernumwandlung (immer zu Dame der Einfachheit halber)
                    if (move.flags.includes('p')) move.promotion = 'q';
                    
                    game.move(move);
                    updateBoard3D();
                    clearHighlights();
                    selectedSquare = null;
                    validMoves = [];
                    
                    checkGameState();
                    
                    // KI ist dran
                    if (!game.game_over()) {
                        statusEl.innerText = "KI denkt nach...";
                        statusEl.style.color = "#F44336";
                        setTimeout(makeAIMove, 50); // Kurze Pause für UI-Update
                    }
                } else {
                    // Klick auf ungültiges Feld oder eigene Figur
                    clearHighlights();
                    selectedSquare = null;
                    validMoves = [];
                    // Wenn auf eigene Figur geklickt, diese neu auswählen
                    const piece = game.get(sqName);
                    if (piece && piece.color === 'w') {
                        handleSquareClick(sqName); 
                    }
                }
            }
        }

        function highlightSquare(sqName, isHint = false) {
            const sq = squares[sqName];
            if (sq) {
                sq.material.color.setHex(isHint ? 0x88ff88 : HIGHLIGHT_COLOR);
            }
        }

        function clearHighlights() {
            for (let key in squares) {
                squares[key].material.color.setHex(squares[key].userData.originalColor);
            }
        }

        function checkGameState() {
            if (game.in_checkmate()) {
                statusEl.innerText = game.turn() === 'w' ? "Schachmatt! KI gewinnt." : "Schachmatt! Du gewinnst!";
            } else if (game.in_draw() || game.in_stalemate() || game.in_threefold_repetition()) {
                statusEl.innerText = "Unentschieden!";
            } else if (game.in_check()) {
                statusEl.innerText = game.turn() === 'w' ? "Du stehst im Schach!" : "KI steht im Schach!";
            } else {
                statusEl.innerText = game.turn() === 'w' ? "Dein Zug (Weiß)" : "KI (Schwarz) ist dran";
                statusEl.style.color = game.turn() === 'w' ? "#FFC107" : "#F44336";
            }
        }

        // --- 5. ADAPTIVE KI (Minimax) ---
        
        // Figurwerte für Evaluierung
        const pieceValues = { p: 10, n: 30, b: 30, r: 50, q: 90, k: 900 };

        function evaluateBoard() {
            let totalEvaluation = 0;
            const board = game.board();
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const piece = board[i][j];
                    if (piece) {
                        const val = pieceValues[piece.type];
                        // Positiv für Weiß (Spieler), Negativ für Schwarz (KI)
                        totalEvaluation += piece.color === 'w' ? val : -val;
                    }
                }
            }
            return totalEvaluation;
        }

        function minimax(depth, alpha, beta, isMaximizingPlayer) {
            if (depth === 0 || game.game_over()) {
                return evaluateBoard();
            }

            const moves = game.moves({ verbose: true });

            if (isMaximizingPlayer) { // Weiß (Spieler simulieren)
                let bestVal = -Infinity;
                for (let i = 0; i < moves.length; i++) {
                    game.move(moves[i]);
                    bestVal = Math.max(bestVal, minimax(depth - 1, alpha, beta, !isMaximizingPlayer));
                    game.undo();
                    alpha = Math.max(alpha, bestVal);
                    if (beta <= alpha) break;
                }
                return bestVal;
            } else { // Schwarz (KI)
                let bestVal = Infinity;
                for (let i = 0; i < moves.length; i++) {
                    game.move(moves[i]);
                    bestVal = Math.min(bestVal, minimax(depth - 1, alpha, beta, !isMaximizingPlayer));
                    game.undo();
                    beta = Math.min(beta, bestVal);
                    if (beta <= alpha) break;
                }
                return bestVal;
            }
        }

        function makeAIMove() {
            const moves = game.moves({ verbose: true });
            if (moves.length === 0) return;

            // ADAPTIVE LOGIK: Evaluiere aktuelle Situation
            // Positiv = Spieler führt. Negativ = KI führt.
            const currentEval = evaluateBoard(); 
            let searchDepth = 2; // Standard

            // Wenn KI zu stark führt (mehr als 3 Punkte / 1 Leichtfigur) -> spiele dümmer (Tiefe 1 oder zufällig)
            if (currentEval < -30) {
                searchDepth = 1; 
                // 30% Chance auf komplett zufälligen Zug bei starker Führung, um Fehler zu simulieren
                if (Math.random() < 0.3) {
                    const randomMove = moves[Math.floor(Math.random() * moves.length)];
                    executeAIMove(randomMove, "Zufall (KI passt sich an)");
                    return;
                }
            } 
            // Wenn der Spieler führt -> spiele härter (Tiefe 3)
            else if (currentEval > 10) {
                searchDepth = 3;
            }
            // Wenn ausgeglichen -> Tiefe 2
            else {
                searchDepth = 2;
            }

            depthEl.innerText = searchDepth;

            // Finde den besten Zug für Schwarz (Minimizing Player)
            let bestMove = null;
            let bestValue = Infinity;

            // Für etwas Varianz, falls mehrere Züge gleich gut sind
            moves.sort(() => Math.random() - 0.5);

            for (let i = 0; i < moves.length; i++) {
                game.move(moves[i]);
                const boardValue = minimax(searchDepth - 1, -Infinity, Infinity, true);
                game.undo();

                if (boardValue < bestValue) {
                    bestValue = boardValue;
                    bestMove = moves[i];
                }
            }

            // Fallback
            if (!bestMove) bestMove = moves[Math.floor(Math.random() * moves.length)];

            executeAIMove(bestMove, searchDepth);
        }

        function executeAIMove(move, depthStr) {
            // Bauernumwandlung für KI
            if (move.flags.includes('p')) move.promotion = 'q';
            
            game.move(move);
            updateBoard3D();
            checkGameState();
        }

        // --- 6. RENDER LOOP ---
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // START
        window.onload = init3D;

    </script>
</body>
</html>
